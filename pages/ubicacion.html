<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Tracker</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/mapa.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="icon" href="../assets/images/Aquatracker.png" type="image/x-icon">
</head>
<body data-page="ubicacion" data-base="../">
    <div id="site-header"></div>

<!-- Mapa -->
    <div class="titulo-pagina">
        <h1>MAPA</h1>
        <hr>
        <div class="intro_especies">
            <br>¿TE GUSTARÍA SABER DONDE SE ENCUENTRAN LAS ESPECIES CON LAS QUE HEMOS TRABAJADO?
        </div>
          
    <div class="container">
        <!-- Mapa con áreas clicables -->
        <div class="mapa">
            <img src="../assets/images/Tenerife_Ubicaciones.jpg" usemap="#image-map" class="imagenTNRF">
            <map name="image-map">
                <area class="animal-button" data-animal="tortuga-boba" coords="130,162,27" shape="circle">
                <area class="animal-button" data-animal="tortuga-verde" coords="406,234,26" shape="circle">
                <area class="animal-button" data-animal="tiburon-azul" coords="360,365,25" shape="circle">
                <area class="animal-button" data-animal="delfin-listado" coords="77,375,30" shape="circle">
            </map>
        </div>
        
        <!-- Contenedor de información del animal -->
        <div class="text-container">
            <h2 id="animal-title">Selecciona un animal</h2>
            <p id="animal-description">Haz clic sobre un animal en el mapa para ver más información.</p>
            <img id="animal-image" src="" alt="" width="250" height="200">
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="../js/templates.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/mapa.js"></script>
</body>
</html>
